name: DailyFitness
options:
  bundleIdPrefix: app.dailybase
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.2.0

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.14.0

targets:
  DailyFitness:
    type: application
    platform: iOS
    sources:
      - path: DailyFitness
        excludes:
          - "**/Resources/Exercises/exercises.json"
          - "**/Resources/Exercises/exercises-manifest.json"
          - "**/Resources/Programs/programs.json"
          - Info.plist
      - path: DailyFitness/Resources/Exercises/exercises.json
        buildPhase: resources
      - path: DailyFitness/Resources/Exercises/exercises-manifest.json
        buildPhase: resources
      - path: DailyFitness/Resources/Programs/programs.json
        buildPhase: resources
    info:
      path: DailyFitness/Info.plist
      properties:
        CFBundleDisplayName: DailyFitness
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSSupportsLiveActivities: true
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        # Register the deep-link scheme used by the Live Activity widgetURL (LOCK-03 / US-062).
        CFBundleURLTypes:
          - CFBundleURLName: app.dailybase.dailyfitness
            CFBundleURLSchemes:
              - dailyfitness
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dailybase.dailyfitness
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: DailyFitness/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: Accent
    entitlements:
      path: DailyFitness/DailyFitness.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.app.dailybase.dailyfitness
        com.apple.developer.usernotifications.time-sensitive: true
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - target: WorkoutLiveActivityExtension
        embed: true

  WorkoutLiveActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: WorkoutLiveActivityExtension
        excludes:
          - Info.plist
      - path: DailyFitness/Shared
        excludes:
          - WorkoutSessionState.swift
          - WorkoutIntentObserver.swift
    info:
      path: WorkoutLiveActivityExtension/Info.plist
      properties:
        # WidgetKit/Live Activity extension point — required for the app (with the
        # embedded extension) to install on device/simulator. xcodegen regenerates
        # this Info.plist, so the key must live here, not only in the file.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dailybase.dailyfitness.liveactivity
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WorkoutLiveActivityExtension/Info.plist
    entitlements:
      path: WorkoutLiveActivityExtension/WorkoutLiveActivityExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.dailybase.dailyfitness

  DailyFitnessTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DailyFitnessTests
    dependencies:
      - target: DailyFitness
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dailybase.dailyfitness.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  DailyFitness:
    build:
      targets:
        DailyFitness: all
        WorkoutLiveActivityExtension: all
        DailyFitnessTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DailyFitnessTests
